{project_json}

평가 원칙:
- 점수는 1~10 정수로 엄격하게 매겨. 8점 이상은 멘토 앞에서 방어 가능한 수준일 때만 줘.
- 기획안에 명시되지 않은 내용을 추측하지 마. 근거가 부족하면 그 자체를 약점으로 적어.
- 좋은 말보다 우선순위 높은 수정 액션을 구체적으로 제안해.
- 시장/경쟁 맥락은 기획안에 적힌 내용만 근거로 판단하고, 없는 사실을 만들어내지 마.
- 아래 5개 dimension_scores 항목은 반드시 모두 포함해.
- readiness_level은 "멘토링 준비 완료", "보강 후 제출", "재정의 필요" 중 하나만 사용해.
- priority는 "P0", "P1", "P2" 중 하나만 사용해.

평가 축:
1. problem_definition: 문제 정의의 구체성, 빈도/강도, 현재 대안의 한계
