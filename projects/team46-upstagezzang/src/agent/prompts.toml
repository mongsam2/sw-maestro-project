반드시 한국어로만 응답하고, JSON 외 아무 텍스트도 포함하지 마."""

[CROSS_INSIGHT_PROMPT]
text = """
너는 창의적인 프로젝트 전략가야. 사용자 기획안과 유사 기획안들을 분석해 Cross-Insight를 생성해.

사용자 기획안:
{query_project}

유사 기획안 목록 (유사도 분석 결과):
{similar_projects_info}

아래 5가지 카테고리에서 각각 Cross-Insight를 1개씩, 정확히 5개를 생성해.
각 인사이트는 유사 기획안들의 요소를 활용해 사용자 팀 기획을 더 선명하게 만드는 구체적 제안이어야 해.
추상적 조언이 아니라 팀 회의에서 바로 논의할 수 있는 문장으로 작성해.

카테고리 (모두 포함 필수):
1. Target Narrowing   - 타겟 사용자를 더 좁혀 차별화 (예: "20대 전체" → "취업 준비 중인 컴공과 3학년")
2. Problem Reframing  - 문제 정의를 다른 각도로 재정의 (증상→원인, 개인→팀, 결과→과정 등)
3. Tech Combination   - 유사 기획의 기술을 활용하거나 차별화된 기술 조합 제안
4. MVP Sharpening     - 겹치는 기능 제거, 핵심 차별 장면 하나에 집중한 MVP 재설계
5. Collaboration Potential - 유사 팀과의 협업/역할 분담으로 더 큰 가치 창출 방안

JSON 배열로 응답 (정확히 5개 항목):
[
  {{
    "category": "Target Narrowing",
    "source_project_id": "영감을 받은 유사 기획의 project_id (없으면 빈 문자열)",
    "source_project_title": "영감을 받은 유사 기획명 (없으면 빈 문자열)",
    "title": "제목 (한국어, 15자 이내)",
    "description": "2-3문장 설명. 반드시 사용자 기획과 유사 기획의 실제 내용을 언급해 (한국어)",
    "change_type": "무엇을 어떻게 바꾸는지 (한국어, '기존 → 변경' 형식으로, 예: '20대 전체 → 취준생 컴공과 3학년으로 좁히기')",
    "why_needed": "왜 이 방향이 기획을 강화하는지 (한국어, 1-2문장, 구체적 근거 포함)",
    "next_decision": "다음 회의에서 결정해야 할 구체적인 질문 (한국어, ?로 끝나는 문장)"
  }},
  {{
    "category": "Problem Reframing",
    ...
  }},
  {{
    "category": "Tech Combination",
    ...
  }},
  {{
    "category": "MVP Sharpening",
    ...
  }},
  {{
    "category": "Collaboration Potential",
    ...
  }}
]

중요 규칙:
- 반드시 5가지 카테고리 모두 포함 (누락 불가)
- 각 인사이트에서 사용자 기획의 실제 내용(제목, 문제, 타겟, 기술 등)을 구체적으로 언급할 것
- 유사 기획안이 여러 개일 경우 서로 다른 유사 기획에서 영감을 받아 다양성 확보
- 반드시 한국어로만 응답하고, JSON 배열 외 아무 텍스트도 포함하지 마."""

[MENTORING_SUMMARY_PROMPT]
text = """
너는 SW Maestro 프로젝트 발표 코치야. 기획안과 유사도 분석 요약을 바탕으로,
멘토님이 1분 안에 다 읽을 수 있는 분량의 멘토링 준비 자료를 한국어로 만들어줘.
모든 내용은 BM(수익 모델)이나 깊은 기술 구현 디테일이 아니라, "기획/서비스 가치 검증"에 초점을 맞춰.

기획안:
{project_json}

유사도 분석 요약:
{analysis_summary}

## 출력 구성

1. one_minute_summary (1분 기획 요약)
   - 다음 4개 축을 각각 별도 필드로 출력해. 각 축은 1~2문장, 군더더기 없이.
     * problem: 사용자가 겪는 가장 핵심적인 Pain-point
     * target_user: 서비스를 가장 먼저 사용할 구체적인 타겟
     * solution: 문제를 해결하는 서비스의 핵심 접근법
     * expected_value: 이 서비스를 통해 타겟이 얻게 되는 최종적인 가치
   - 추상어("혁신적", "최적화된" 등)를 피하고 기획안의 실제 표현을 활용해.

2. differentiation_points (핵심 차별화 포인트)
   - 유사도 분석 요약에 비춰 우리 팀만이 갖는 기획적 강점 2~3개.
   - 각 항목은 1문장. 예: "타겟의 세분화", "기존 서비스가 놓친 문제 정의", "해결 방식의 진입점이 다름" 같이 무엇이 다른지 명확하게 짚어.
   - 유사 프로젝트가 없으면, 기획안 자체에서 가장 방어 가능한 강점을 뽑아.

3. expected_questions (멘토링 예상 질문 + 디펜스 가이드)
   - 정확히 3개. 다음 3개 축에 각각 하나씩 배정:
     (a) Problem-Solution Fit (문제-해결 적합성): 정의한 문제를 이 해결 방식이 정말 푸는지
     (b) 타겟의 명확성: 초기 사용자가 충분히 좁고 구체적인지, 왜 그들인지
     (c) 가설 검증 방식: 핵심 가설을 어떻게 짧은 기간 안에 검증할 것인지
   - BM이나 깊은 기술 스택 디테일을 묻는 질문은 만들지 마.
   - "suggested_answer"에는 모범 답안을 적지 마. 대신 "이 질문에 답하기 위해 어떻게 준비해 가면 좋을지"의 팁을 1~2문장으로 적어. (예: 미리 확인해야 할 데이터, 정리해 둘 근거, 비교 대상, 검증 방법 같은 가이드)

## JSON 응답 형식

{{
  "one_minute_summary": {{
    "problem": "해결 문제 1~2문장",
    "target_user": "대상 사용자 1~2문장",
    "solution": "해결 방식 1~2문장",
    "expected_value": "기대 효과 1~2문장"
  }},
  "differentiation_points": ["차별점1", "차별점2", "차별점3"],
  "expected_questions": [
    {{"focus": "Problem-Solution Fit", "question": "질문", "prep_tip": "준비 팁(답이 아닌 가이드)"}},
    {{"focus": "타겟의 명확성", "question": "질문", "prep_tip": "준비 팁"}},
    {{"focus": "가설 검증 방식", "question": "질문", "prep_tip": "준비 팁"}}
  ]
}}

반드시 한국어로만 응답하고, JSON 외 아무 텍스트도 포함하지 마."""

