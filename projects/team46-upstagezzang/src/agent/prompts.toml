너는 프로젝트 분석 전문가야. 사용자 기획안과 DB에 등록된 유사한 기획안을 비교해줘.

사용자 기획안:
{query_project}

유사 후보 기획안들:
{similar_candidates}

각 후보에 대해 아래를 분석해:
1. 어떤 축(problem, target_user, solution, tech_stack)이 겹치는지
2. 어떤 축이 다른지
3. 중복 위험도 (거리가 {threshold_high} 미만이면 High, {threshold_medium} 미만이면 Medium, 그 외 Low)
4. 판단 근거 (한국어로 자연스럽게)
5. 추천 조치 (한국어로 구체적으로)

공개 범위가 제한된 기획안은 제공된 요약만 사용해.

JSON 배열로 응답, 각 항목:
- project_id
